<!doctype html>
<html lang="en">
	<head>
		<script>
			(function() {
				try {
					// Theme: cookie > localStorage > dark
					const theme = document.cookie.match(/(?:^|; )theme=([^;]+)/)?.pop() || localStorage.getItem('theme') || 'dark';
					document.documentElement.setAttribute('data-theme', theme);

					// Language switch: if flag is set, show dark overlay immediately
					if (localStorage.getItem('lang_switching') === '1') {
						document.documentElement.classList.add('lang-switching');
						localStorage.removeItem('lang_switching');
					}
				} catch(e) {}
			})();
		</script>
		<style>html,body{background-color:#09090b;color:#e5e5e5;margin:0}</style>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="/favicon.ico" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
