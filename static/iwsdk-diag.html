<!DOCTYPE html>
<html>
<head><title>IWSDK Diagnostics</title></head>
<body style="background:#1a1a22;color:#e5e5e5;font-family:monospace;padding:20px;">
<h2>IWSDK World.create() Diagnostics</h2>
<div id="log" style="white-space:pre-wrap;font-size:14px;line-height:1.6;"></div>
<div id="container" style="width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:-1;"></div>
<script>
const log = document.getElementById('log');
function add(msg) {
    const time = new Date().toISOString().split('T')[1];
    log.textContent += `[${time}] ${msg}\n`;
    console.log(msg);
}
window.onerror = function(msg, url, line, col, error) {
    add('GLOBAL ERROR: ' + msg + ' | ' + (error?.stack || ''));
};
window.addEventListener('unhandledrejection', function(event) {
    add('UNHANDLED REJECTION: ' + (event.reason?.stack || event.reason));
});
</script>
<script type="module">
add('Starting diagnostics...');

try {
    add('Step 1: Checking navigator.xr...');
    add('  navigator.xr: ' + navigator.xr);
    add('  navigator.xr?.offerSession: ' + navigator.xr?.offerSession);
    add('  navigator.xr?.isSessionSupported: ' + navigator.xr?.isSessionSupported);

    add('Step 2: Importing @iwsdk/core...');
    const iwsdk = await import('/node_modules/.vite/deps/@iwsdk_core.js?v=d2368ee4');
    add('  Import OK. Exports: ' + Object.keys(iwsdk).slice(0, 10).join(', ') + '...');

    add('Step 3: Checking World and SessionMode...');
    add('  World: ' + typeof iwsdk.World);
    add('  World.create: ' + typeof iwsdk.World?.create);
    add('  SessionMode: ' + JSON.stringify(iwsdk.SessionMode));
    add('  Transform: ' + typeof iwsdk.Transform);

    add('Step 4: Creating container element...');
    const container = document.getElementById('container');
    add('  Container: ' + container.tagName + ', dims: ' + container.clientWidth + 'x' + container.clientHeight);

    add('Step 5: Calling World.create()...');
    const worldPromise = iwsdk.World.create(container, {
        xr: {
            sessionMode: iwsdk.SessionMode.ImmersiveAR,
            features: { anchors: true, hitTest: true },
        },
        features: {
            locomotion: false,
            grabbing: false,
            physics: false,
        },
    });
    add('  World.create() returned: ' + typeof worldPromise + ' (isPromise: ' + (worldPromise instanceof Promise) + ')');

    // Timeout to detect hanging
    const timeout = setTimeout(() => {
        add('⚠️ TIMEOUT: World.create() did not resolve within 15 seconds!');
        add('This indicates the LevelSystem never processed the initial level load.');
    }, 15000);

    worldPromise.then(world => {
        clearTimeout(timeout);
        add('✅ World.create() RESOLVED!');
        add('  world.scene: ' + typeof world.scene);
        add('  world.camera: ' + typeof world.camera);
        add('  world.renderer: ' + typeof world.renderer);
        add('  world.renderer.domElement: ' + world.renderer?.domElement?.tagName);
        add('  world.scene.children.length: ' + world.scene?.children?.length);
        add('  world.systems count: ' + world.systems?.length);
        
        // Test registering custom components
        try {
            const { createComponent, Types } = iwsdk;
            add('Step 6: Testing createComponent...');
            const testComp = createComponent('test-comp', {
                id: { type: Types.String, default: '' },
            });
            world.registerComponent(testComp);
            add('  ✅ registerComponent OK');
        } catch(e) {
            add('  ❌ registerComponent FAILED: ' + e.message);
        }
        
        // Cleanup
        add('Step 7: Cleaning up...');
        world.renderer?.dispose();
        add('✅ All diagnostics passed!');
    }).catch(err => {
        clearTimeout(timeout);
        add('❌ World.create() REJECTED: ' + (err?.stack || err?.message || err));
    });

} catch(e) {
    add('❌ THREW: ' + (e?.stack || e?.message || e));
}
</script>
</body>
</html>
