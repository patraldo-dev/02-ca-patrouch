<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Test</title>
<style>
* { margin: 0; padding: 0; }
body { background: #050508; color: #c9a87c; font-family: system-ui, sans-serif; }
canvas { display: block; width: 100vw; height: 100vh; }
#log { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 0.6rem; padding: 0.5rem; max-height: 40vh; overflow-y: auto; z-index: 100; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="log"></div>
<script>
(function() {
  var log = document.getElementById('log');
  function msg(s) { log.innerHTML += s + '<br>'; log.scrollTop = log.scrollHeight; }
  
  msg('Step 1: Canvas 2D test');
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  if (!ctx) { msg('FAIL: no 2D context'); return; }
  msg('2D context OK');
  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  // Draw colored circles
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#ff0066';
  ctx.beginPath();
  ctx.arc(canvas.width * 0.5, canvas.height * 0.5, 80, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#00ff88';
  ctx.beginPath();
  ctx.arc(canvas.width * 0.25, canvas.height * 0.5, 60, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#c9a87c';
  ctx.beginPath();
  ctx.arc(canvas.width * 0.75, canvas.height * 0.5, 60, 0, Math.PI * 2);
  ctx.fill();
  
  msg('Step 2: Drew 3 circles. Can you see pink/green/gold?');
  
  msg('Step 3: WebGL test');
  try {
    var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) {
      msg('WebGL NOT supported');
    } else {
      msg('WebGL supported! Version: ' + gl.getParameter(gl.VERSION));
      msg('Renderer: ' + gl.getParameter(gl.RENDERER));
      
      // Clear to dark blue
      gl.clearColor(0.04, 0.04, 0.07, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);
      msg('Step 4: Cleared WebGL canvas to dark blue');
    }
  } catch(e) {
    msg('WebGL error: ' + e.message);
  }
  
  msg('DONE');
})();
</script>
</body>
</html>
