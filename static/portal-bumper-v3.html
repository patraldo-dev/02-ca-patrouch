<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>patrouch.ca — Bumper v3: Pure Letters</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; font-family: 'Inter', system-ui, sans-serif; }
  #scene { position: fixed; inset: 0; }
  #skip { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); padding: 0.4rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.75rem; backdrop-filter: blur(10px); }
  #skip:hover { color: #fff; }
  #wordmark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 50; pointer-events: none; text-align: center; opacity: 0; transition: opacity 0.5s ease; }
  #wordmark.show { opacity: 1; }
  #wordmark h1 { font-weight: 800; font-size: clamp(2rem, 8vw, 4.5rem); color: #c9a87c; letter-spacing: -0.02em; text-shadow: 0 0 60px rgba(201,168,124,0.6); }
  #wordmark p { font-weight: 200; font-size: clamp(0.75rem, 3vw, 1.05rem); color: rgba(255,255,255,0.5); margin-top: 0.6rem; letter-spacing: 0.08em; }
  #content { position: fixed; inset: 0; z-index: 10; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.8s ease; pointer-events: none; }
  #content.show { opacity: 1; }
  #content a { color: #c9a87c; text-decoration: none; font-size: 1.1rem; border: 1px solid rgba(201,168,124,0.4); padding: 0.6rem 2rem; border-radius: 24px; }
  .nav-links { position: fixed; top: 1rem; left: 1rem; z-index: 200; display: flex; gap: 0.5rem; }
  .nav-links a { font-size: 0.7rem; color: rgba(255,255,255,0.3); text-decoration: none; padding: 0.3rem 0.6rem; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
  .nav-links a.current { color: #c9a87c; border-color: rgba(201,168,124,0.3); }
</style>
</head>
<body>
<div class="nav-links">
  <a href="/portal-bumper-v1.html">v1 Confetti</a>
  <a href="/portal-bumper-v2.html">v2 Lava</a>
  <a href="/portal-bumper-v3.html" class="current">v3 Letters</a>
  <a href="/portal-bumper-v4.html">v4 Hybrid</a>
</div>
<canvas id="scene"></canvas>
<button id="skip">Skip</button>
<div id="wordmark"><h1>patrouch.ca</h1><p id="tagline">A Playful Space for Serious Writing</p></div>
<div id="content"><a href="/portals">Enter Portals →</a></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// v3: Pure alphabet — massive letters raining and swirling, psychedelic colors
// No images, no thumbnails. Just typography in motion.

const LETTERS = 'patrouch AEIOU escribir jugar portal espacio palabras escribir'.split('');
const COLORS = ['#c9a87c', '#ff6b35', '#2d5a27', '#7c4dff', '#0277bd', '#9c27b0', '#546e7a', '#e6a23c', '#26a69a', '#ec407a'];

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050508);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

let phase = 0, phaseStart = 0;
const PHASE_DURATIONS = [3.0, 1.5, 0.8];
const wordmarkEl = document.getElementById('wordmark');
const contentEl = document.getElementById('content');
const skipBtn = document.getElementById('skip');
const lang = navigator.language?.slice(0,2) || 'en';
const taglines = { en: 'A Playful Space for Serious Writing', es: 'Un Espacio Lúdico para Escritura Seria', fr: "Un Espace Ludique pour l'Écriture Sérieuse" };
document.getElementById('tagline').textContent = taglines[lang] || taglines.en;

function makeLetterTexture(char, color) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const ctx = c.getContext('2d');
  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;
  ctx.font = 'bold 140px Inter, Georgia, serif';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(char, 128, 138);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

const COUNT = 120;
const letters = [];
const group = new THREE.Group();
scene.add(group);

for (let i = 0; i < COUNT; i++) {
  const char = LETTERS[i % LETTERS.length];
  const color = COLORS[i % COLORS.length];
  const tex = makeLetterTexture(char, color);
  const s = 0.15 + Math.random() * 0.45;
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(s * 0.6, s * 0.6), mat);

  // Start in a vertical column above the screen
  mesh.position.set(
    (Math.random() - 0.5) * 8,
    3 + Math.random() * 8,
    (Math.random() - 0.5) * 4 - 1,
  );
  mesh.rotation.z = Math.random() * Math.PI * 2;
  group.add(mesh);

  letters.push({
    mesh, mat,
    fallSpeed: 0.3 + Math.random() * 0.8,
    swayAmt: 0.3 + Math.random() * 0.8,
    swayFreq: 0.5 + Math.random() * 1.5,
    swayPhase: Math.random() * 6.28,
    rotSpeed: (Math.random() - 0.5) * 1.5,
    depth: 0.2 + Math.random() * 0.8,
    sx: 0, sy: 0, sz: 0,
    baseColor: color,
  });
}

// Psychedelic flowing BG — warmer, more chromatic
const bgUni = { uTime: {value:0}, uIntensity: {value:0.6}, uMouse: {value:new THREE.Vector2()} };
const bgMat = new THREE.ShaderMaterial({ uniforms: bgUni, depthTest:false, depthWrite:false,
  vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=vec4(position,1.0);}`,
  fragmentShader: `uniform float uTime,uIntensity;uniform vec2 uMouse;varying vec2 vUv;
    vec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return -1.+2.*fract(sin(p)*43758.5453);}
    float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);vec2 u=f*f*(3.-2.*f);return mix(mix(dot(hash2(i),f),dot(hash2(i+vec2(1,0)),f-vec2(1,0)),u.x),mix(dot(hash2(i+vec2(0,1)),f-vec2(0,1)),dot(hash2(i+vec2(1,1)),f-vec2(1,1)),u.x),u.y);}
    float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}
    void main(){
      vec2 p=vUv-0.5;p.x*=1.6;float t=uTime*.06;
      vec2 q=vec2(fbm(p+vec2(t,t*.7)),fbm(p+vec2(-t*.5,t*1.2)));
      vec2 r=vec2(fbm(p+2.*q+vec2(t*1.3,-t)),fbm(p+2.*q+vec2(-t,t*.9)));
      float n=fbm(p+3.*r);
      vec3 c1=vec3(.79,.66,.49);vec3 c2=vec3(.49,.31,1.);vec3 c3=vec3(1.,.42,.21);
      vec3 col=mix(c1,c2,smoothstep(-.3,.4,n));
      col=mix(col,c3,smoothstep(.2,.7,length(r))*.5);
      col*=.1*uIntensity*(1.-length(p)*.5);
      float g=fract(sin(dot(vUv*(uTime+1.),vec2(12.9898,78.233)))*43758.5453);
      col+=(g-.5)*.015;
      gl_FragColor=vec4(col,1.);
    }`
});
const bgMesh = new THREE.Mesh(new THREE.PlaneGeometry(2,2), bgMat); bgMesh.frustumCulled=false; bgMesh.renderOrder=-1000; scene.add(bgMesh);

let mouseX=0,mouseY=0,tMouseX=0,tMouseY=0;
window.addEventListener('pointermove',(e)=>{tMouseX=(e.clientX/innerWidth-.5)*2;tMouseY=(e.clientY/innerHeight-.5)*2;});

const clock = new THREE.Clock(); let elapsed=0;

function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),.05);elapsed+=dt;
  mouseX+=(tMouseX-mouseX)*.04;mouseY+=(tMouseY-mouseY)*.04;
  bgUni.uMouse.value.set(mouseX,mouseY);
  bgUni.uTime.value=elapsed;
  camera.position.x=mouseX*.15;camera.position.y=-mouseY*.1;camera.lookAt(0,0,0);
  const pe=elapsed-phaseStart;

  if(phase===0){
    bgUni.uIntensity.value=.6+Math.sin(elapsed*.3)*.1;
    for(const l of letters){
      l.mat.opacity+=(.6-l.mat.opacity)*.01;
      // Rain down with sway
      l.mesh.position.y -= l.fallSpeed * dt;
      l.mesh.position.x += Math.sin(elapsed * l.swayFreq + l.swayPhase) * l.swayAmt * dt;
      l.mesh.position.z += (mouseX * l.depth * 0.3 - l.mesh.position.z + 1) * 0.02;

      // Recycle when below screen
      if (l.mesh.position.y < -4) {
        l.mesh.position.y = 4 + Math.random() * 3;
        l.mesh.position.x = (Math.random() - 0.5) * 8;
      }
      l.mesh.rotation.z += l.rotSpeed * dt * 0.3;
    }
    if(pe>=PHASE_DURATIONS[0]){phase=1;phaseStart=elapsed;wordmarkEl.classList.add('show');}
  } else if(phase===1){
    bgUni.uIntensity.value=.35;
    for(const l of letters){
      const px=l.mesh.position.x,py=l.mesh.position.y,d=Math.sqrt(px*px+py*py)+.01;
      l.mesh.position.x-=(px/d)*d*1.2*dt;
      l.mesh.position.y-=(py/d)*d*1.2*dt;
      l.mesh.rotation.z+=l.rotSpeed*dt*(1+2/(d+.3));
      if(d<.8)l.mat.opacity*=.93;
    }
    if(pe>=PHASE_DURATIONS[1]){phase=2;phaseStart=elapsed;wordmarkEl.classList.remove('show');
      for(const l of letters){const px=l.mesh.position.x||(Math.random()-.5),py=l.mesh.position.y||(Math.random()-.5);const len=Math.sqrt(px*px+py*py)||1,sp=4+Math.random()*7;l.sx=(px/len)*sp;l.sy=(py/len)*sp;l.sz=(Math.random()-.5)*3;}
    }
  } else if(phase===2){
    const p=pe/PHASE_DURATIONS[2];bgUni.uIntensity.value=.2*(1-p);
    for(const l of letters){l.mesh.position.x+=l.sx*dt;l.mesh.position.y+=l.sy*dt;l.mesh.position.z+=l.sz*dt;l.sy-=2*dt;l.mesh.rotation.z+=l.rotSpeed*dt*2;l.mat.opacity=Math.max(0,.6*(1-p));}
    if(pe>=PHASE_DURATIONS[2]){phase=3;contentEl.style.display='flex';requestAnimationFrame(()=>contentEl.classList.add('show'));skipBtn.style.display='none';}
  }
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
skipBtn.onclick=()=>{phase=3;for(const l of letters)l.mat.opacity=0;bgUni.uIntensity.value=0;wordmarkEl.classList.remove('show');contentEl.style.display='flex';requestAnimationFrame(()=>contentEl.classList.add('show'));skipBtn.style.display='none';};
phaseStart=0;animate();
</script>
</body></html>
